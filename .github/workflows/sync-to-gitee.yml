name: Sync to Gitee

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  sync:
    name: Push master to Gitee
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee by HTTPS token
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPOSITORY: SmartDictate
        run: |
          set -euo pipefail

          if [ -z "$GITEE_USERNAME" ] || [ -z "$GITEE_TOKEN" ]; then
            echo "GITEE_USERNAME 或 GITEE_TOKEN 未配置，请先在 GitHub Secrets 中配置。"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          auth_header="$(printf "%s:%s" "$GITEE_USERNAME" "$GITEE_TOKEN" | base64 -w 0)"
          gitee_url="https://gitee.com/${GITEE_USERNAME}/${GITEE_REPOSITORY}.git"

          git remote remove gitee 2>/dev/null || true
          git remote add gitee "$gitee_url"

          git -c "http.https://gitee.com/.extraheader=AUTHORIZATION: Basic ${auth_header}" \
            push --force gitee HEAD:master
