<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartDictate</title>
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <h1>SmartDictate</h1>
            <p>本地优先的智能语音输入助手</p>
          </div>
          <div class="status-pill" id="apiStatus">后端检测中</div>
        </header>

        <section class="control-panel" aria-label="语音输入控制">
          <div class="field">
            <label for="sceneSelect">输入场景</label>
            <select id="sceneSelect">
              <option value="general">通用输入</option>
              <option value="meeting">会议纪要</option>
              <option value="study">学习笔记</option>
              <option value="message">聊天回复</option>
              <option value="code_note">代码说明</option>
            </select>
          </div>

          <div class="field">
            <label for="vendorSelect">识别工具</label>
            <select id="vendorSelect">
              <option value="browser">本机浏览器识别</option>
              <option value="xfyun">科大讯飞 API</option>
              <option value="baidu" disabled>百度 API（未配置）</option>
              <option value="future" disabled>待扩展 API（未配置）</option>
            </select>
          </div>

          <div class="field" id="apiField">
            <label for="providerSelect">具体接口</label>
            <select id="providerSelect">
              <option value="browser">浏览器 Web Speech API</option>
              <option value="xfyun_iat">语音听写 IAT</option>
              <option value="xfyun_lfasr_large">录音文件转写大模型</option>
            </select>
          </div>

          <div class="field">
            <label for="sourceSelect">音频来源</label>
            <select id="sourceSelect">
              <option value="microphone">直接监听麦克风</option>
              <option value="file">选择本机音频文件</option>
              <option value="system">扬声器 / 标签页音频</option>
            </select>
          </div>

          <div class="field">
            <label for="languageSelect">音频种类</label>
            <select id="languageSelect">
              <option value="zh_en">中英混合</option>
              <option value="zh_cn">中文普通话</option>
              <option value="en_us">英语</option>
              <option value="ja_jp">日语</option>
              <option value="dialect">方言</option>
              <option value="other">其他 / 待扩展</option>
            </select>
          </div>

          <div class="field">
            <label for="modeSelect">识别模式</label>
            <select id="modeSelect">
              <option value="short">短音频听写</option>
              <option value="realtime">实时转写</option>
              <option value="long">录音文件转写</option>
            </select>
          </div>

          <div class="field file-field" id="fileField">
            <label for="audioFileInput">音频文件</label>
            <input id="audioFileInput" type="file" accept="audio/*,.pcm,.wav,.mp3,.m4a" />
          </div>

          <div class="actions">
            <button class="primary-button" id="recordButton" type="button">开始识别</button>
            <button class="secondary-button" id="sampleButton" type="button">填入示例</button>
            <button class="secondary-button" id="processButton" type="button">整理文本</button>
            <button class="secondary-button" id="copyButton" type="button">复制结果</button>
            <button class="secondary-button" id="clearButton" type="button">清空</button>
          </div>
        </section>

        <section class="recognition-panel" aria-label="语音识别状态">
          <div>
            <span class="eyebrow">识别状态</span>
            <strong id="recognitionStatus">等待输入</strong>
          </div>
          <p id="interimText">浏览器识别会实时显示临时结果；API 识别会在录制或上传完成后返回文本。</p>
        </section>

        <section class="editor-grid">
          <div class="editor-pane">
            <div class="pane-header">
              <h2>原始转写</h2>
              <span>可手动编辑</span>
            </div>
            <textarea id="rawText" placeholder="点击开始识别，录制短音频或上传长音频文件，也可以直接粘贴文本进行整理。"></textarea>
          </div>

          <div class="editor-pane">
            <div class="pane-header">
              <h2>整理结果</h2>
              <span id="copyStatus">未复制</span>
            </div>
            <textarea id="processedText" placeholder="整理后的文本会显示在这里。"></textarea>
          </div>
        </section>

        <section class="metrics-grid" aria-label="输入效率指标">
          <article>
            <span>原文字数</span>
            <strong id="rawLength">0</strong>
          </article>
          <article>
            <span>结果字数</span>
            <strong id="processedLength">0</strong>
          </article>
          <article>
            <span>清理口癖</span>
            <strong id="removedFillers">0</strong>
          </article>
          <article>
            <span>识别耗时</span>
            <strong id="elapsedSeconds">0s</strong>
          </article>
        </section>
      </section>

      <aside class="side-panel">
        <section class="dictionary-panel">
          <div class="pane-header">
            <h2>热词字典</h2>
            <span id="hotwordStatus">未加载</span>
          </div>
          <form class="hotword-form" id="hotwordForm">
            <input id="hotwordSource" maxlength="80" placeholder="识别词，例如 小七" />
            <input id="hotwordTarget" maxlength="80" placeholder="标准词，例如 七天云助手" />
            <button class="secondary-button" type="submit">添加</button>
          </form>
          <div id="hotwordList" class="hotword-list"></div>
        </section>

        <section class="history-panel">
          <div class="pane-header">
            <h2>最近记录</h2>
            <div class="history-toolbar">
              <button class="text-button" id="refreshHistoryButton" type="button">刷新</button>
              <button class="text-button danger-text" id="clearHistoryButton" type="button">清空</button>
            </div>
          </div>
          <div id="historyList" class="history-list"></div>
        </section>
      </aside>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
